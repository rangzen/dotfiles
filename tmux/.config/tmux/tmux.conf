# Inspired by Omarchy configuration
# https://learn.omacom.io/2/the-omarchy-manual/53/hotkeys#tmux

# Theming
# Stability configuration without scripts, plugins, etc.

# Essential WezTerm Color Passthrough
# This ensures Neovim/apps inside tmux look identical to outside
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Base Status Bar Styling
# bg=default makes the bar transparent to WezTerm's background
set -g status-position bottom
set -g status-style bg=default,fg=default
set -g status-justify left

# Left Side (Session Name)
# Pulls WezTerm's default magenta
set -g status-left "#[fg=magenta,bold] ❐ #S #[default]  "
set -g status-left-length 30

# Right Side (Pane Title, ISO Date, Time)
# Keeps the default tmux content with your cyan styling
set -g status-right "#[fg=cyan,bold]\"#{pane_title}\" %Y-%m-%d %H:%M "

# Window List
# Dimmer gray for inactive windows, bright blue for the active one
setw -g window-status-format "#[fg=color244] #I:#W "
setw -g window-status-current-format "#[fg=blue,bold] #I:#W "

# Pane Borders
# Subtle lines to separate splits, highlighting the active pane in magenta
set -g pane-border-style fg=color236
set -g pane-active-border-style fg=magenta

# Set prefix to Ctrl+Space
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Default Shell: Fish
set -g default-shell /usr/bin/fish

# Use mouse scroll on terminal buffer instead of command history,
# select pane, etc.
set -g mouse on

# Pane management
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
bind x kill-pane
bind z resize-pane -Z

# Navigate panes with Shift+Alt+Arrows
bind -n M-S-Left select-pane -L
bind -n M-S-Right select-pane -R
bind -n M-S-Up select-pane -U
bind -n M-S-Down select-pane -D

# Resize panes with Ctrl+Alt+Arrows
# May require removing shortcuts for switching workspaces in GNOME:
# gsettings set org.gnome.desktop.wm.keybindings switch-to-workspace-left "[]"
# gsettings set org.gnome.desktop.wm.keybindings switch-to-workspace-right "[]"
# gsettings set org.gnome.desktop.wm.keybindings switch-to-workspace-up "[]"
# gsettings set org.gnome.desktop.wm.keybindings switch-to-workspace-down "[]"
bind -n C-M-Left resize-pane -L 5
bind -n C-M-Right resize-pane -R 5
bind -n C-M-Up resize-pane -U 5
bind -n C-M-Down resize-pane -D 5

# Window operations
bind c new-window -c "#{pane_current_path}"
bind k kill-window
bind r command-prompt -I "#{window_name}" "rename-window '%%'"

# Alt+"«»()@+-/* to jump to window (BÉPO: direct keys for 1-9 and 0)
unbind '"'
bind -n M-\" select-window -t 1
bind -n M-« select-window -t 2
bind -n M-» select-window -t 3
bind -n M-( select-window -t 4
bind -n M-) select-window -t 5
bind -n M-@ select-window -t 6
bind -n M-+ select-window -t 7
bind -n M-- select-window -t 8
bind -n M-/ select-window -t 9
bind -n M-* select-window -t 0

# Alt+Left/Right to switch windows
bind -n M-Left previous-window
bind -n M-Right next-window

# When last window closes, switch to last active session instead of detaching
set -g detach-on-destroy no-detached

# Session control
bind C new-session
bind K kill-session
bind R command-prompt -I "#{session_name}" "rename-session '%%'"
bind N switch-client -n
bind P switch-client -p

# Alt+Up/Down to move between sessions
bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# Copy mode (vi-style)
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Reload config
bind q source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
